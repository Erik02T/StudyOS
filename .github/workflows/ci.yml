name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  migration-gate:
    name: Migration Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studyos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d studyos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/studyos
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Ensure Alembic has a single head
        shell: bash
        run: |
          HEADS="$(python -m alembic heads)"
          echo "$HEADS"
          COUNT="$(echo "$HEADS" | grep -c '(head)' || true)"
          if [ "$COUNT" -ne 1 ]; then
            echo "Expected exactly 1 alembic head, got $COUNT"
            exit 1
          fi

      - name: Run migrations to head
        run: python -m alembic upgrade head

  deploy_backend_railway:
    name: deploy-backend-railway
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, migration-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ vars.STAGING_BACKEND_URL }}
    concurrency:
      group: deploy-backend-railway-staging
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
          RAILWAY_BACKEND_SERVICE: ${{ secrets.RAILWAY_BACKEND_SERVICE }}
        shell: bash
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_PROJECT_ID" ] || [ -z "$RAILWAY_ENVIRONMENT" ] || [ -z "$RAILWAY_BACKEND_SERVICE" ]; then
            echo "Missing required Railway secrets."
            exit 1
          fi

          railway up --ci \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_BACKEND_SERVICE" \
            ./backend

  deploy_frontend_vercel:
    name: deploy-frontend-vercel
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, migration-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ vars.STAGING_FRONTEND_URL }}
    concurrency:
      group: deploy-frontend-vercel-staging
      cancel-in-progress: true
    outputs:
      frontend_url: ${{ steps.deploy.outputs.frontend_url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"

      - name: Build with Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        shell: bash
        run: |
          DEPLOYMENT_URL="$(vercel deploy --prebuilt --token "$VERCEL_TOKEN" --yes | tail -n 1 | tr -d '\r')"
          if [[ "$DEPLOYMENT_URL" != http* ]]; then
            DEPLOYMENT_URL="https://$DEPLOYMENT_URL"
          fi
          echo "frontend_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed frontend at $DEPLOYMENT_URL"

  smoke_check_staging:
    name: smoke-check-staging
    runs-on: ubuntu-latest
    needs: [deploy_backend_railway, deploy_frontend_vercel]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
    steps:
      - name: Smoke check backend /health
        env:
          BACKEND_HEALTH_URL: ${{ vars.STAGING_BACKEND_HEALTH_URL }}
        shell: bash
        run: |
          if [ -z "$BACKEND_HEALTH_URL" ]; then
            echo "Missing required variable: STAGING_BACKEND_HEALTH_URL"
            exit 1
          fi

          for attempt in {1..20}; do
            if curl -fsS "$BACKEND_HEALTH_URL" >/tmp/backend-health.txt; then
              cat /tmp/backend-health.txt
              exit 0
            fi
            echo "Backend health check attempt $attempt failed. Retrying..."
            sleep 6
          done
          echo "Backend health check failed."
          exit 1

      - name: Smoke check frontend URL
        env:
          FRONTEND_URL_FROM_DEPLOY: ${{ needs.deploy_frontend_vercel.outputs.frontend_url }}
          FRONTEND_URL_FALLBACK: ${{ vars.STAGING_FRONTEND_URL }}
        shell: bash
        run: |
          FRONTEND_URL="$FRONTEND_URL_FROM_DEPLOY"
          if [ -z "$FRONTEND_URL" ]; then
            FRONTEND_URL="$FRONTEND_URL_FALLBACK"
          fi
          if [ -z "$FRONTEND_URL" ]; then
            echo "Missing frontend URL (deploy output and STAGING_FRONTEND_URL are empty)."
            exit 1
          fi

          for attempt in {1..20}; do
            if curl -I -fsS "$FRONTEND_URL" >/tmp/frontend-head.txt; then
              cat /tmp/frontend-head.txt
              exit 0
            fi
            echo "Frontend smoke check attempt $attempt failed. Retrying..."
            sleep 6
          done
          echo "Frontend smoke check failed for $FRONTEND_URL"
          exit 1
